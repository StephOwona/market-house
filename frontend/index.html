<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Market House — Connexion</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
<div class="auth-wrapper">
  <div class="auth-box">
    <div class="auth-logo">
      <div style="font-size:3rem; margin-bottom:8px;">🛵</div>
      <h1>Market House</h1>
      <p>Faites votre marché depuis chez vous</p>
    </div>

    <div class="auth-tabs">
      <button class="auth-tab active" id="tab-login" onclick="showTab('login')">Connexion</button>
      <button class="auth-tab" id="tab-register" onclick="showTab('register')">Créer un compte</button>
    </div>

    <!-- LOGIN -->
    <div id="panel-login">
      <div id="login-alert" class="alert alert-error hidden"></div>
      <form id="login-form" onsubmit="doLogin(event)">
        <div class="form-group">
          <label class="form-label">Adresse email</label>
          <input id="l-email" type="email" class="form-control" placeholder="votre@email.com" required />
        </div>
        <div class="form-group">
          <label class="form-label">Mot de passe</label>
          <div style="position:relative;">
            <input id="l-password" type="password" class="form-control" placeholder="••••••••" required style="padding-right:40px;" />
            <span class="pwd-toggle" onclick="togglePassword('l-password')" style="position:absolute; right:12px; top:50%; transform:translateY(-50%); cursor:pointer; color:var(--text-muted);">👁</span>
          </div>
        </div>
        <button type="submit" class="btn btn-primary btn-full" id="login-btn">
          <span>Se connecter</span>
        </button>
      </form>
      <div class="divider">ou</div>
      <p style="text-align:center; font-size:0.88rem; color:var(--text-muted)">
        Pas encore de compte ? <a href="#" onclick="showTab('register')">Créer un compte</a>
      </p>
      <div style="margin-top:20px; padding:14px; background:rgba(108,99,255,0.08); border-radius:10px; border:1px solid rgba(108,99,255,0.2);">
        <p style="font-size:0.8rem; color:var(--text-muted); text-align:center; line-height:1.6;">
          <strong style="color:var(--accent2);">Compte admin par défaut</strong><br>
          📧 admin@market.com &nbsp;|&nbsp; 🔑 Admin123!
        </p>
      </div>
    </div>

    <!-- REGISTER -->
    <div id="panel-register" class="hidden">
      <div id="reg-alert" class="alert alert-error hidden"></div>
      <form id="reg-form" onsubmit="doRegister(event)">
        <p style="font-size:0.85rem; color:var(--text-muted); margin-bottom:16px;">Choisissez votre rôle :</p>
        <div class="role-selector">
          <div class="role-btn selected" onclick="selectRole('client', this)" id="role-client">
            <span class="role-icon">🛒</span>
            <div class="role-label">Client</div>
          </div>
          <div class="role-btn" onclick="selectRole('courier', this)" id="role-courier">
            <span class="role-icon">🚴</span>
            <div class="role-label">Coursier</div>
          </div>
        </div>
        <input type="hidden" id="r-role" value="client" />
        <div class="form-group">
          <label class="form-label">Nom complet</label>
          <input id="r-name" type="text" class="form-control" placeholder="Votre nom" required />
        </div>
        <div class="form-group">
          <label class="form-label">Adresse email</label>
          <input id="r-email" type="email" class="form-control" placeholder="votre@email.com" required />
        </div>
        <div class="form-group">
          <label class="form-label">Mot de passe</label>
          <div style="position:relative;">
            <input id="r-password" type="password" class="form-control" placeholder="Minimum 6 caractères" required style="padding-right:40px;" />
            <span class="pwd-toggle" onclick="togglePassword('r-password')" style="position:absolute; right:12px; top:50%; transform:translateY(-50%); cursor:pointer; color:var(--text-muted);">👁</span>
          </div>
        </div>
        <button type="submit" class="btn btn-primary btn-full" id="reg-btn">
          <span>Créer mon compte</span>
        </button>
      </form>
    </div>
  </div>
</div>

<div id="toast-container"></div>

<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>
<script>
  // Redirect if already logged in
  if (getToken() && getUser()) redirectByRole(getUser());

  let selectedRole = 'client';

  function showTab(tab) {
    document.getElementById('panel-login').classList.toggle('hidden', tab !== 'login');
    document.getElementById('panel-register').classList.toggle('hidden', tab !== 'register');
    document.getElementById('tab-login').classList.toggle('active', tab === 'login');
    document.getElementById('tab-register').classList.toggle('active', tab === 'register');
  }

  function togglePassword(inputId) {
    const input = document.getElementById(inputId);
    const toggle = input.nextElementSibling;
    if (input.type === 'password') {
      input.type = 'text';
      toggle.textContent = '👁‍🗨';
    } else {
      input.type = 'password';
      toggle.textContent = '👁';
    }
  }

  function selectRole(role, el) {
    selectedRole = role;
    document.getElementById('r-role').value = role;
    document.querySelectorAll('.role-btn').forEach(b => b.classList.remove('selected'));
    el.classList.add('selected');
  }

  function showAlert(id, msg, type='error') {
    const el = document.getElementById(id);
    el.className = `alert alert-${type}`;
    el.textContent = msg;
    el.classList.remove('hidden');
  }

  async function doLogin(e) {
    e.preventDefault();
    const btn = document.getElementById('login-btn');
    btn.innerHTML = '<span class="spinner"></span>';
    btn.disabled = true;
    try {
      const res = await api.post('/api/auth/login', {
        email: document.getElementById('l-email').value,
        password: document.getElementById('l-password').value
      });
      saveAuth(res.token, res.user);
      redirectByRole(res.user);
    } catch (err) {
      showAlert('login-alert', err.message);
      btn.innerHTML = '<span>Se connecter</span>';
      btn.disabled = false;
    }
  }

  async function doRegister(e) {
    e.preventDefault();
    const btn = document.getElementById('reg-btn');
    btn.innerHTML = '<span class="spinner"></span>';
    btn.disabled = true;
    try {
      const res = await api.post('/api/auth/register', {
        name: document.getElementById('r-name').value,
        email: document.getElementById('r-email').value,
        password: document.getElementById('r-password').value,
        role: selectedRole
      });
      saveAuth(res.token, res.user);
      redirectByRole(res.user);
    } catch (err) {
      showAlert('reg-alert', err.message);
      btn.innerHTML = '<span>Créer mon compte</span>';
      btn.disabled = false;
    }
  }
</script>
</body>
</html>
